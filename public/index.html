<!doctype html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gondola</title>
  <meta name="description" content="Application">
  <link href="app/css/bootstrap.min.css" rel="stylesheet">
  <link href="app/css/navbar-fixed-top.css" rel="stylesheet">
  <link href="app/css/application.css" rel="stylesheet">
</head>
<body>
  <header class="navbar navbar-expand-md fixed-top app-shell-navbar bg-white border-bottom" data-bs-theme="light">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold text-body-emphasis" href="#containers">Gondola</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#primary-nav" aria-controls="primary-nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="primary-nav">
        <ul class="navbar-nav me-auto mb-2 mb-md-0 align-items-md-center">
          <li class="nav-item module"><a class="nav-link app-shell-link px-3 py-2" data-module="containers" href="#containers">Containers</a></li>
          <li class="nav-item module"><a class="nav-link app-shell-link px-3 py-2" data-module="images" href="#images">Images</a></li>
          <li class="nav-item module"><a class="nav-link app-shell-link px-3 py-2" data-module="system" href="#system">System</a></li>
        </ul>
      </div>
    </div>
  </header>
  <div class="container-fluid" id="panel"></div>
  <script src="app/js/vendor/bootstrap.bundle.min.js"></script>
  <script src="app/js/vendor/require.js"></script>
  <script src="app/js/boot.js"></script>
  <script>
    (function() {
      var moduleByRoute = {
        containers: 'containers',
        container: 'containers',
        images: 'images',
        system: 'system'
      };

      var updatePrimaryNavigation = function() {
        var fragment = window.location.hash.replace(/^#/, '') || 'containers';
        var routeRoot = fragment.split('/')[0];
        var activeModule = moduleByRoute[routeRoot] || 'containers';
        var links = document.querySelectorAll('.navbar-nav .nav-link[data-module]');

        Array.prototype.forEach.call(links, function(link) {
          var isActive = link.getAttribute('data-module') === activeModule;
          link.classList.toggle('active', isActive);
          if (isActive) {
            link.setAttribute('aria-current', 'page');
          } else {
            link.removeAttribute('aria-current');
          }
        });
      };

      var closeMobileNavigation = function(target) {
        var nav = document.getElementById('primary-nav');
        if (!nav || !window.bootstrap || !nav.classList.contains('show')) {
          return;
        }

        if (!target.closest('.nav-link[data-module]')) {
          return;
        }

        window.bootstrap.Collapse.getOrCreateInstance(nav).hide();
      };

      window.addEventListener('hashchange', updatePrimaryNavigation);
      window.addEventListener('load', updatePrimaryNavigation);
      document.addEventListener('click', function(event) {
        closeMobileNavigation(event.target);
      });
    })();
  </script>
</body>
</html>
